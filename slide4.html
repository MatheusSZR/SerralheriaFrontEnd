<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Galeria de projetos da Serralheria Rodrigues." />
  <meta name="keywords" content="galeria serralheria, projetos, portões, grades, cercas" />
  <meta name="author" content="Matheus de Souza Rodrigues" />
  <title>Serralheria Rodrigues | Galeria</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <a class="skip-link" href="#conteudo">Pular para o conteúdo principal</a>

  <header class="site-header">
    <div class="container nav-wrap">
      <h1 class="brand">Serralheria Rodrigues</h1>
      <nav aria-label="Menu principal" class="main-nav">
        <ul>
          <li><a href="index.html">Início</a></li>
          <li><a href="slide1.html">Serviços</a></li>
          <li><a href="slide2.html">Orçamento</a></li>
          <li><a href="slide3.html">Produtos</a></li>
          <li><a href="slide4.html" aria-current="page">Galeria</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main id="conteudo" class="section">
    <div class="container">
      <h2>Galeria de Projetos</h2>
      <p class="lead">Clique em uma imagem para ampliar.</p>

      <div class="gallery-grid">
        <button class="gallery-item" type="button" data-gallery-trigger>
          <img class="zoom" src="midias/imagem/portaodeferro.jpg" alt="Portão de ferro personalizado" loading="lazy" />
        </button>
        <button class="gallery-item" type="button" data-gallery-trigger>
          <img class="zoom" src="midias/imagem/grade1.jpg" alt="Grade de segurança reforçada" loading="lazy" />
        </button>
        <button class="gallery-item" type="button" data-gallery-trigger>
          <img class="zoom" src="midias/imagem/cerca1.jpg" alt="Cerca de aço resistente" loading="lazy" />
        </button>
      </div>
    </div>

    <div id="galleryModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="galleryModalTitle" aria-hidden="true">
      <div class="modal-content modal-content-gallery">
        <button class="close" type="button" aria-label="Fechar imagem">&times;</button>
        <h3 id="galleryModalTitle">Imagem ampliada</h3>
        <img id="galleryModalImage" src="" alt="" />
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Serralheria Rodrigues. Todos os direitos reservados.</p>
    </div>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>
